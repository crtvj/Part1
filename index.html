<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Message For You</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
flex-direction:column;
padding:20px;
}

button{
padding:14px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
margin-top:20px;
}

</style>
</head>

<body>

<h1 id="title">Hey Shylah ❤️</h1>
<p id="text">I made this page just for you.</p>

<button onclick="nextPage()">Continue</button>

<script>

let step = 0;

function nextPage(){

let title = document.getElementById("title");
let text = document.getElementById("text");

if(step === 0){
title.innerHTML = "There's Something I Want To Tell You";
text.innerHTML = "You make my days better and my smile bigger.";
}

else if(step === 1){
title.innerHTML = "The Truth";
text.innerHTML = "You became someone very special in my life.";
}

else if(step === 2){
title.innerHTML = "But This Isn't Everything...";
text.innerHTML = "Something special is coming soon.";
}

else if(step === 3){
title.innerHTML = "Be Ready ❤️";
text.innerHTML = "Soon I will ask you something important.";
}

step++;

}

</script>

</body>
</html>
