<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Message For You</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
flex-direction:column;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#ff1e4d;
}

</style>
</head>

<body>

<audio id="song" loop>
<source src="love-song.mp3" type="audio/mpeg">
</audio>

<h1 id="title">Hey Shylah ❤️</h1>
<p id="text">There's something I've been wanting to tell you...</p>

<button onclick="next()">Continue</button>

<script>

var step = 0;

function next(){

var title = document.getElementById("title");
var text = document.getElementById("text");
var song = document.getElementById("song");

if(step == 0){
song.play();
title.innerHTML = "You Are Special";
text.innerHTML = "You make my days better and my smile bigger.";
}

else if(step == 1){
title.innerHTML = "The Truth";
text.innerHTML = "You became someone very important in my life.";
}

else if(step == 2){
title.innerHTML = "But Wait...";
text.innerHTML = "This is not everything I want to say.";
}

else if(step == 3){
title.innerHTML = "Something Special Is Coming";
text.innerHTML = "Soon I will ask you something important... ❤️";
}

step++;

}

</script>

</body>
</html>
